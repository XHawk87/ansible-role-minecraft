---
- name: (Deprecation) Catch and report renamed settings
  ansible.builtin.fail:
    msg: >-
      Your configuration contains a variable, which now has a different name.
      Please change your configuration to rename the variable (`{{ item.old }}` -> `{{ item.new }}`).
  when: "lookup('ansible.builtin.varnames', ('^' + item.old + '$'), wantlist=True) | length > 0"
  with_items:
    - { "old": "minecraft_container_publish_ports", "new": "<Deleted>" }
    - { "old": "minecraft_container_publish_ports_default", "new": "<Deleted>" }
    - { "old": "minecraft_container_publish_ports_additional", "new": "<Deleted>" }
    - { "old": "minecraft_container_volumes", "new": "minecraft_container_additional_volumes" }
    - { "old": "minecraft_container_volumes_derived", "new": "minecraft_container_additional_volumes_auto" }
    - { "old": "minecraft_container_volumes_additional", "new": "minecraft_container_additional_volumes_custom" }
    - { "old": "minecraft_environment_variables", "new": "minecraft_environment_variables_additional_variables" }
    - { "old": "minecraft_environment_variables_default", "new": "minecraft_environment_variables_additional_variables_default" }
    - { "old": "minecraft_environment_variables_derived", "new": "minecraft_environment_variables_additional_variables_auto" }
    - { "old": "minecraft_environment_variables_additional", "new": "minecraft_environment_variables_additional_variables_custom" }
    - { "old": "minecraft_container_image_force_pull", "new": "<removed> (the new community.docker.docker_image_pull module handles this natively)" }

- name: Fail if required Minecraft settings not defined
  ansible.builtin.fail:
    msg: >
      You need to define a required configuration setting (`{{ item }}`).
  when: "vars[item] == ''"
  with_items:
    - minecraft_identifier
    - minecraft_uid
    - minecraft_gid
    - minecraft_container_network

- name: Validate Minecraft security settings
  ansible.builtin.assert:
    that:
      - minecraft_security_mode == 'insecure' or
        (minecraft_security_privileged | bool == false and
         minecraft_security_write_access | bool == false and
         minecraft_security_allow_capabilities | length == 0)
    fail_msg: >
      Before changing any of the `minecraft_security_` settings, please read
      the section on Security Settings in defaults/main.yml of the role, and
      set `minecraft_security_mode` to `insecure` to acknowledge the risks.
