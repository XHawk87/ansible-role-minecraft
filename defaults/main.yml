---
# Project source code URL: https://github.com/itzg/docker-minecraft-server

minecraft_enabled: true

minecraft_identifier: minecraft
minecraft_base_path: "/var/minecraft/{{ minecraft_identifier }}"
minecraft_data_path: "{{ minecraft_base_path }}/data"

# This is the version of the itzg/minecraft-server image, NOT the Minecraft
# server version. To set the Minecraft server version, you must set the VERSION
# environment variable in `minecraft_environment_variables_additional_variables_custom`.
#
# renovate: datasource=docker depName=itzg/docker-minecraft-server versioning=semver
minecraft_docker_version: 2025.4.2

minecraft_uid: ''
minecraft_gid: ''

minecraft_container_image: "{{ minecraft_container_image_registry_prefix }}itzg/minecraft-server:{{ minecraft_container_image_tag }}"
minecraft_container_image_registry_prefix: "{{ minecraft_container_image_registry_prefix_upstream }}"
minecraft_container_image_registry_prefix_upstream: "{{ minecraft_container_image_registry_prefix_upstream_default }}"
minecraft_container_image_registry_prefix_upstream_default: docker.io/
minecraft_container_image_tag: "{{ minecraft_docker_version }}"

# The base container network. It will be auto-created by this role if it doesn't exist already.
minecraft_container_network: "{{ minecraft_identifier }}"

# Specify how the container publishes its TCP port (as defined by `minecraft_container_tcp_port`).
#
# Takes an "<ip>:<port>" or "<port>" value (e.g. "127.0.0.1:2586"), or empty string to not expose.
minecraft_container_tcp_host_bind_port: "{{ minecraft_container_tcp_port }}"

# The port number in the container
minecraft_container_tcp_port: 25565

# A list of additional container networks that the container would be connected to.
# The role does not create these networks, so make sure they already exist.
# Use this to expose this container to another reverse proxy, which runs in a different container network.
minecraft_container_additional_networks: "{{ minecraft_container_additional_networks_auto + minecraft_container_additional_networks_custom }}"
minecraft_container_additional_networks_auto: []
minecraft_container_additional_networks_custom: []

# A list of additional "volumes" to mount in the container.
# This list gets populated dynamically at runtime. You can provide a different default value,
# if you wish to mount your own files into the container.
# Contains definition objects like this: `{"type": "bind", "src": "/outside", "dst": "/inside", "options": "readonly"}.
# See the `--mount` documentation for the `docker run` command.
minecraft_container_additional_volumes: "{{ minecraft_container_additional_volumes_auto + minecraft_container_additional_volumes_custom }}"
minecraft_container_additional_volumes_auto:
  - "{{ minecraft_data_path }}:/data"
minecraft_container_additional_volumes_custom: []

# minecraft_container_labels_additional_labels contains a multiline string with additional labels to add to the container label file.
# See `../templates/labels.j2` for details.
#
# Example:
# minecraft_container_labels_additional_labels: |
#   my.label=1
#   another.label="here"
#
# TODO: Add labels for mc-router auto-discovery
minecraft_container_labels_additional_labels: ''

# Specifies how often the container health-check will run.
#
# For Traefik based setups, it's important that the interval is short,
# because the interval value also specifies the "initial wait time".
# This is a Docker (moby) bug: https://github.com/moby/moby/issues/33410
# Without a successful healthcheck, Traefik will not register the service for reverse-proxying.
# Thus, the health interval determines the initial start-up time -- the smaller, the better.
#
# For non-Traefik setups, we use the default healthcheck interval (60s) to decrease overhead.
minecraft_container_health_intervals: "{{ '5s' if docker_registry_proxy_container_labels_traefik_enabled else '60s' }}"

# A list of extra arguments to pass to the container (`docker create` command)
minecraft_container_extra_arguments: "{{ minecraft_container_extra_arguments_auto + minecraft_container_extra_arguments_custom }}"
minecraft_container_extra_arguments_auto: []
minecraft_container_extra_arguments_custom: []

# List of systemd services that Minecraft systemd service depends on
minecraft_systemd_required_services_list: "{{ minecraft_systemd_required_services_list_default + minecraft_systemd_required_services_list_auto + minecraft_systemd_required_services_list_custom }}"
minecraft_systemd_required_services_list_default: "{{ [devture_systemd_docker_base_docker_service_name] if devture_systemd_docker_base_docker_service_name else [] }}"
minecraft_systemd_required_services_list_auto: []
minecraft_systemd_required_services_list_custom: []

# List of systemd services that the Minecraft systemd service wants
minecraft_systemd_wanted_services_list: "{{ minecraft_systemd_wanted_services_list_default + minecraft_systemd_wanted_services_list_auto + minecraft_systemd_wanted_services_list_custom }}"
minecraft_systemd_wanted_services_list_default: []
minecraft_systemd_wanted_services_list_auto: []
minecraft_systemd_wanted_services_list_custom: []

# Controls how long to wait for the container to stop gracefully before killing it.
minecraft_container_stop_grace_time_seconds: "{{ devture_systemd_docker_base_container_stop_grace_time_seconds }}"

# Controls how long the pre-start cleanup should wait for stale container-name release
# before failing startup explicitly.
minecraft_container_cleanup_timeout_seconds: "{{ devture_systemd_docker_base_container_cleanup_timeout_seconds }}"

# Controls the delay between pre-start cleanup retries.
minecraft_container_cleanup_retry_delay_seconds: "{{ devture_systemd_docker_base_container_cleanup_retry_delay_seconds }}"

# Shell command used in the systemd pre-start phase to deterministically remove a stale
# container and wait until Docker releases its name.
minecraft_container_cleanup_command: |
  i=0;
  while [ "$i" -lt {{ minecraft_container_cleanup_timeout_seconds }} ]; do
  {{ devture_systemd_docker_base_host_command_docker }} stop -t {{ minecraft_container_stop_grace_time_seconds }} {{ minecraft_identifier }} >/dev/null 2>&1 || true;
  {{ devture_systemd_docker_base_host_command_docker }} rm -f {{ minecraft_identifier }} >/dev/null 2>&1 || true;
  if {{ devture_systemd_docker_base_host_command_docker }} container inspect {{ minecraft_identifier }} >/dev/null 2>&1; then
  i=$((i + 1));
  sleep {{ minecraft_container_cleanup_retry_delay_seconds }};
  continue;
  fi;
  if {{ devture_systemd_docker_base_host_command_docker }} info >/dev/null 2>&1; then
  exit 0;
  fi;
  echo "Failed to query Docker daemon while cleaning up {{ minecraft_identifier }}" >&2;
  exit 1;
  done;
  echo "Failed to remove stale container {{ minecraft_identifier }} after {{ minecraft_container_cleanup_timeout_seconds }} attempts" >&2;
  exit 1

# Security settings for the docker container.
#
# Changing these settings can introduce security flaws. Please refer to the
# docker manual before using any of these settings:
# https://docs.docker.com/engine/containers/run/#runtime-privilege-and-linux-capabilities

# This will need to be set to `insecure` in order to use less secure settings.
minecraft_security_mode: secure

# This grants the Minecraft server all capabilities and allows it to as much
# access to the host as if it were run outside of a container. This could be
# exploited by a malicious mod or plugin to make changes to your server, and
# potentially gain control over it.
minecraft_security_privileged: false

# This allows changes to be made to the container's root filesystem. This would
# allow a malicious mod or plugin to take control over the container, making
# changes that persist until it is rebuilt.
minecraft_security_write_access: false

# This allows you to grant specific linux capabilities to the docker container.
# This is recommended as a more fine-grained approach than using
# `minecraft_security_privileged`. However it is still important to read and
# understand what these capabilities could be used for by a malicious mod or
# plugin. E.g.
#
# minecraft_security_allow_capabilities:
#   - KILL
#
# This would allow the container to send kill signals to processes running
# inside the container.
#
# For a full list, see:
# https://docs.docker.com/engine/containers/run/#runtime-privilege-and-linux-capabilities
minecraft_security_allow_capabilities: []

minecraft_container_dns_servers: "{{ minecraft_container_dns_servers_default + minecraft_container_dns_servers_custom }}"

minecraft_container_dns_servers_default:
  # Cloudflare DNS
  - '1.1.1.1'
  - '1.0.0.1'

  # Google DNS
  - '8.8.8.8'
  - '8.8.4.4'

  # dns.quad9.net
  - '9.9.9.9'
  - '149.112.112.112'

minecraft_container_dns_servers_custom: []

# Additional environment variables.
# See: https://docker-minecraft-server.readthedocs.io/en/latest/variables/
minecraft_environment_variables_additional_variables: |
  {{ minecraft_environment_variables_additional_variables_default }}
  {{ minecraft_environment_variables_additional_variables_auto }}
  {{ minecraft_environment_variables_additional_variables_custom }}
minecraft_environment_variables_additional_variables_default: |
  EULA=TRUE
minecraft_environment_variables_additional_variables_auto: |
  UID={{ minecraft_uid }}
  GID={{ minecraft_gid }}
minecraft_environment_variables_additional_variables_custom: ''

# minecraft_restart_necessary controls whether the Minecraft systemd
# service will be restarted (when true) or merely started (when false) by the
# systemd service manager role (when conditional restart is enabled).
#
# This value is automatically computed during installation based on whether
# any configuration files, the systemd service file, or the container image changed.
# The default of `false` means "no restart needed" — appropriate when the role's
# installation tasks haven't run (e.g., due to --tags skipping them).
minecraft_restart_necessary: false
